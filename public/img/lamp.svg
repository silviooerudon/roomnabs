<svg viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Desk lamp">
  <ellipse cx="96" cy="196" rx="60" ry="9" fill="#000" opacity=".07"/>
  <!-- base -->
  <rect x="56" y="180" width="86" height="12" rx="6" fill="#2b313c"/>
  <!-- arm lower -->
  <rect x="92" y="70" width="9" height="116" rx="4.5" fill="#3a4150" transform="rotate(6 96 128)"/>
  <!-- joint -->
  <circle cx="98" cy="74" r="7" fill="#5a6473"/>
  <!-- arm upper -->
  <rect x="98" y="48" width="9" height="58" rx="4.5" fill="#3a4150" transform="rotate(-58 102 70)"/>
  <!-- lamp head (flat bar LED) -->
